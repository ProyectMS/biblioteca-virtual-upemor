<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3° Cuatrimestre - Biblioteca UPEMOR</title>
  <style>
    /* SISTEMA DE DISEÑO INSTITUCIONAL OPTIMIZADO */
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

    :root {
        --primary-purple: #4B2C82;
        --action-red: #EF233C;
        --accent-gold: #FFB703;
        --ice-blue: #F0F4F8;
        --white: #FFFFFF;
        --text-main: #1A1D23;
        --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--ice-blue);
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    header {
        text-align: center;
        padding: 50px 20px;
    }

    .back-btn {
        display: inline-block;
        margin-bottom: 20px;
        color: var(--action-red);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.3s;
    }

    .back-btn:hover { opacity: 0.7; }

    header h2 {
        font-weight: 800;
        font-size: 2.5rem;
        color: var(--primary-purple);
        letter-spacing: -1px;
    }

    .container {
        max-width: 1000px;
        margin: 0 auto 60px auto;
        padding: 0 20px;
        flex: 1;
    }

    .materias-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
    }

    /* TARJETAS SIN IMÁGENES */
    .materia-card {
        background: var(--white);
        border-radius: 16px;
        display: flex;
        align-items: center;
        padding: 25px;
        text-decoration: none;
        color: inherit;
        box-shadow: var(--shadow-soft);
        transition: all 0.3s ease;
        border: 1px solid rgba(0,0,0,0.02);
        position: relative;
        overflow: hidden;
        /* Barra de color lateral */
        border-left: 5px solid var(--primary-purple);
    }

    .materia-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(75, 44, 130, 0.1);
        border-left-color: var(--action-red);
    }

    .materia-info h3 {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-main);
        line-height: 1.3;
        padding-right: 25px;
    }

    .materia-card::after {
        content: "→";
        position: absolute;
        right: 20px;
        color: var(--primary-purple);
        opacity: 0.2;
        font-size: 1.2rem;
        transition: 0.3s;
    }

    .materia-card:hover::after {
        opacity: 1;
        right: 15px;
        color: var(--action-red);
    }

    .footer {
        background: var(--white);
        padding: 30px;
        text-align: center;
        border-top: 1px solid rgba(0,0,0,0.05);
        margin-top: auto;
    }

    .footer p {
        font-size: 0.85rem;
        color: #718096;
    }
  </style>
</head>
<body>

<header>
  <div class="container" style="margin-bottom: 0;">
    <a href="../index.html" class="back-btn">← Volver al Portal</a>
    <h2>3° Cuatrimestre</h2>
  </div>
</header>

<div class="container">
  <div class="materias-grid">
    
    <a href="#" class="materia-card" data-materia="Desarrolo del Pensamiento y Toma de Decisiones" data-link="https://drive.google.com/drive/folders/1OzbWOCTTRx-sqF5cme-fBRSjqweylCPY?usp=drive_link">
      <div class="materia-info"><h3>Desarrollo del Pensamiento y Toma de Decisiones</h3></div>
    </a>

    <a href="#" class="materia-card" data-materia="Cálculo Integral" data-link="https://drive.google.com/drive/folders/1ydMpgtaBMyM_g3Q5Z3gVJ8rwCGDQMSpp?usp=drive_link">
      <div class="materia-info"><h3>Cálculo Integral</h3></div>
    </a>

    <a href="#" class="materia-card" data-materia="Control de Calidad" data-link="https://drive.google.com/drive/folders/1UzxkOMCdR8ZsyaEMJORO_JVi9jmnMNpr?usp=drive_link">
      <div class="materia-info"><h3>Control de Calidad</h3></div>
    </a>

    <a href="#" class="materia-card" data-materia="Procesos de Fabricación" data-link="https://drive.google.com/drive/folders/1OMa9JXpxuxUX5s8WYwlETHQPhV3PIIeL?usp=drive_link">
      <div class="materia-info"><h3>Procesos de Fabricación</h3></div>
    </a>

    <a href="#" class="materia-card" data-materia="Estudio del Trabajo" data-link="https://drive.google.com/drive/folders/13LGLRv9GX09mdChcRnyUDUcJ9HuqZtbX?usp=drive_link">
      <div class="materia-info"><h3>Estudio del Trabajo</h3></div>
    </a>

  </div>
</div>

<footer class="footer">
    <p>Universidad Politécnica del Estado de Morelos</p>
    <p>© 2026 PIV - Todos los derechos no reservados</p>
</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxWfpfnxzzA0djGcuz4cPsEkETDWyq96I31GaT0QNKWLMXMC-C2_3nKY9J8UcS98abjIA/exec';
const alumno = JSON.parse(localStorage.getItem('alumno'));

document.querySelectorAll('[data-materia]').forEach(link => {
  link.addEventListener('click', (e) => {
    e.preventDefault();
    const materia = link.dataset.materia;
    const url = link.dataset.link;

    // 1. ABRIR DRIVE DE INMEDIATO
    // Esto hace que Safari detecte que el "clic" abrió la ventana directamente
    // y NO la bloquee.
    window.open(url, '_blank');

    // 2. REGISTRAR EL CLIC EN SEGUNDO PLANO
    // No usamos "await" para que no detenga el flujo del navegador
    if(alumno && alumno.matricula) {
      fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors', // Esto hace la petición más rápida y "silenciosa"
        body: JSON.stringify({
          action: 'register_click',
          matricula: alumno.matricula,
          cuatrimestre: '3', // <--- RECUERDA CAMBIAR ESTO SEGÚN EL ARCHIVO (1, 2, 3...)
          materia: materia
        })
      }).catch(err => console.log("Registro fallido, pero Drive se abrió igual"));
    }
  });
});
</script>

</body>
</html>
